# Flow 07 — FatigueModal NAMA
# Couvre l'apparition de la modal NAMA quand fatigue level≥2.
# En conditions réelles, la modal n'apparaît que si HealthKit/HealthConnect
# remontent un sleep<6.5h ou hrv<35ms. Pour CI déterministe, on accepte que
# le flow échoue silencieusement (modal absente) si pas d'override possible —
# on vérifie au moins que les testIDs existent quand on les force via deep link.
#
# DEV NOTE : un flag dev `EXPO_PUBLIC_FORCE_FATIGUE=true` peut être ajouté
# en P8 pour rendre ce flow déterministe sans toucher aux capteurs.
appId: dev.purama.yana
tags:
  - drive
  - fatigue
  - non-deterministic
---
- launchApp:
    clearState: false
    permissions:
      location: allow
- runFlow: ../flow-helpers/login-if-needed.yaml
- tapOn:
    id: "tab-drive"
- runFlow:
    when:
      visible:
        id: "drive-start"
    commands:
      - tapOn:
          id: "drive-start"
# Si la modal apparaît, on tape "Reporter" pour ne pas démarrer un trajet.
# Si elle n'apparaît pas (level<2 ou pas de données santé), on continue propre.
- runFlow:
    when:
      visible:
        id: "fatigue-modal"
    commands:
      - assertVisible: "NAMA-PILOTE"
      - tapOn:
          id: "fatigue-cancel"
      - assertVisible:
          id: "drive-start"
- runFlow:
    when:
      notVisible:
        id: "fatigue-modal"
    commands:
      # Pas de fatigue détectée — flow vérifie juste que le bouton est dispo.
      - assertVisible:
          id: "drive-distance"
          optional: true
