name: Mobile CI

# Vérifie que toute PR / push touchant mobile/ compile et passe les lints
# avant qu'on déclenche un EAS build (qui coûte ~15 min cloud).
#
# Étapes locales reproduites en CI :
#  - npm ci (legacy-peer-deps obligatoire avec react@19 + react-native peers)
#  - tsc --noEmit (strict)
#  - npm run maestro:lint (12 flows valides + testIDs alignés)
#  - npx expo export --platform ios (smoke Hermes bundle)
#
# Pas de Maestro CLI ni Java ici — c'est un test rapide < 5 min.

on:
  pull_request:
    paths:
      - "mobile/**"
      - "scripts/lint-maestro.mjs"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - "scripts/lint-maestro.mjs"

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: TypeScript + Maestro lint + Expo export iOS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: Install root deps (for js-yaml used by lint-maestro)
        run: npm ci --legacy-peer-deps

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: TypeScript strict (mobile)
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Maestro YAML lint
        run: node scripts/lint-maestro.mjs

      - name: Expo doctor
        working-directory: mobile
        run: npx expo-doctor || true # Non-bloquant : warnings tolérés P7.C

      - name: Expo export iOS (Hermes bundle smoke)
        working-directory: mobile
        run: npx expo export --platform ios --output-dir /tmp/yana-ci-ios
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://auth.purama.dev
          EXPO_PUBLIC_SUPABASE_ANON_KEY: dummy_for_export_only
          EXPO_PUBLIC_APP_SLUG: yana
          EXPO_PUBLIC_WEB_URL: https://yana.purama.dev
